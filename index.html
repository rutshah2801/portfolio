<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rutvi Shah | Project Management Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Great+Vibes&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Nunito"', 'sans-serif'],
              heading: ['"Times New Roman"', 'Times', 'serif'],
              signature: ['"Great Vibes"', 'cursive'],
            },
            colors: {
              brand: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
              }
            },
            animation: {
              blob: "blob 7s infinite",
              gradient: "gradient 15s ease infinite",
            },
            keyframes: {
              blob: {
                "0%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
                "33%": {
                  transform: "translate(30px, -50px) scale(1.1)",
                },
                "66%": {
                  transform: "translate(-20px, 20px) scale(0.9)",
                },
                "100%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
              },
              gradient: {
                "0%, 100%": {
                  "background-position": "0% 50%",
                },
                "50%": {
                  "background-position": "100% 50%",
                },
              },
            },
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 5rem;
      }
      body {
        background-color: #f8fafc; /* Matches slate-50 used in Hero */
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      /* Custom Hexagon Pattern Background */
      .bg-hex-pattern {
        background-color: #f8fafc;
        background-image: url("data:image/svg+xml,%3Csvg width='56' height='100' viewBox='0 0 56 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M28 66L0 50L0 16L28 0L56 16L56 50L28 66L28 100' fill='none' stroke='%236366f1' stroke-width='1' stroke-opacity='0.05'/%3E%3Cpath d='M28 0L28 33' fill='none' stroke='%236366f1' stroke-width='1' stroke-opacity='0.05'/%3E%3C/svg%3E");
      }
    </style>

  }
}
</script>
</head>
